[settings]
mouse_mode = true
data_compact_columns = true
data_row_spacer = false

[db]

[keybindings.Menu]
"<Ctrl-c>" = "Quit"
"q" = "AbortQuery"
"<Ctrl-1>" = "FocusMenu"
"<Ctrl-2>" = "FocusEditor"
"<Ctrl-3>" = "FocusData"
"<Ctrl-4>" = "FocusHistory"
"<Ctrl-5>" = "FocusFavorites"
"<Tab>" = "CycleFocusForwards"
"<Backtab>" = "CycleFocusBackwards"

[keybindings.Editor]
"<Alt-q>" = "AbortQuery"
"<Ctrl-Enter>" = "SubmitEditorQuery"
"<Alt-Enter>" = "SubmitEditorQueryBypassParser"
"<Ctrl-1>" = "FocusMenu"
"<Ctrl-2>" = "FocusEditor"
"<Ctrl-3>" = "FocusData"
"<Ctrl-4>" = "FocusHistory"
"<Ctrl-5>" = "FocusFavorites"
"<Backtab>" = "CycleFocusBackwards"

