set -g default-shell /bin/zsh
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g history-limit 100000
set -g xterm-keys on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
unbind C-b
set-option -g prefix C-j
bind-key C-j send-prefix
bind | split-window -h
bind _ split-window -v
unbind '"'
unbind %

bind -r j select-pane -L
bind -r k select-pane -R

bind -n M-h previous-window
bind -n M-l next-window
bind -n M-j select-pane -L
bind -n M-k select-pane -R

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6

bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5
bind-key -n S-Enter send-keys -H 1b5b31333b3275
set -s copy-command 'pbcopy'
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'

set -g @vscode_dark_plus_widgets ""
set -g @vscode_dark_plus_time_format "%R"
set -g @vscode_dark_plus_date_format "%d/%m"

run-shell 'bash ~/.config/tmux/vscode-dark-plus.tmux'
